# open.mp anti-cheat configuration.
# copy this file to your server's components/anticheat.cfg (next to the
# anticheat.so / anticheat.dll). every setting is optional; the values shown
# are the defaults. lines starting with # are comments.

# master switch.
enabled = 1

# detect and log everything but never kick/ban. use this first on a live server
# to check for false positives before you start enforcing.
log_only = 0

# announce detections to admins (reserved; currently logs to console).
announce = 1

# timing.
ban_duration_minutes   = 180    # 0 = permanent
kick_delay_ms          = 1500   # grace before the kick, so the message shows
evaluate_delay_ms      = 2500    # after connect, when collected checks are judged
spawn_recheck_delay_ms = 1800    # after spawn, second wave of checks

# detection modules. the two raw-raknet ones are off by default because they
# peek at raw packets; enable them only after testing on your setup.
module.memory  = 1
module.version = 1
module.poison  = 1
module.mobile  = 0     # rpc 25 join checksum: legit-mobile whitelist + fakemobile
module.raknet  = 0     # rpc 103 serialization anomaly (s0beit)
module.faker5  = 1     # detect faker5-style clientcheck spoofers (clean disk image vs live memory)
module.scc     = 1     # detect scc_ac_bypass-style static clientcheck spoofers (constant reply, blind to offset/count)

# allowed client versions (comma separated). empty = the built-in list.
allowed_versions = 0.3.7-R3,0.3.7-R4,0.3.7-R5,0.3.DL-R1

# legit mobile client identity.
mobile_gpci     = ED40ED0E8089CC44C08EE9580F4C8C44EE8EE990
mobile_checksum = 0xBEEF

# per-cheat actions: ignore | warn | kick | ban
# (omit a line to use the built-in default shown here)
action.s0beit             = kick
action.cleo               = kick
action.cleo_moonloader    = kick
action.silentpatch        = warn
action.sampfuncs          = kick
action.vorbisfile         = warn
action.ultrawh            = kick
action.silentaim          = kick
action.improved_deagle    = kick
action.stealth_remastered = kick
action.sensfix            = kick
action.s0beit_raknet      = kick
action.fakemobile         = ban
action.modded_client      = kick
action.faker5             = kick
action.scc                = kick
